<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <!-- 定义渐变和滤镜 -->
    <defs>
        <!-- 背景底座的微弱渐变，增加深度感 -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#212121;stop-opacity:1" />
        </linearGradient>

        <!-- 染色体的全光谱渐变 (红-橙-黄-绿-蓝) -->
        <linearGradient id="chromoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF3B30;stop-opacity:1" /> <!-- 红 -->
            <stop offset="25%" style="stop-color:#FF9500;stop-opacity:1" /> <!-- 橙 -->
            <stop offset="50%" style="stop-color:#FFCC00;stop-opacity:1" /> <!-- 黄 -->
            <stop offset="75%" style="stop-color:#4CD964;stop-opacity:1" /> <!-- 绿 -->
            <stop offset="100%" style="stop-color:#007AFF;stop-opacity:1" /> <!-- 蓝 -->
        </linearGradient>

        <!-- 微弱的投影滤镜 -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
            <feOffset dx="0" dy="10" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 1. macOS 标准圆角矩形底座 (Apple Squircle 模拟) -->
    <rect x="128" y="128" width="768" height="768" rx="160" fill="url(#bgGradient)" />

    <!-- 2. X 形染色体路径 -->
    <!-- 使用两条圆头粗线条交叉模拟染色体单体 -->
    <g filter="url(#dropShadow)">
        <path d="M350 300 L674 724" 
              stroke="url(#chromoGradient)" 
              stroke-width="120" 
              stroke-linecap="round" 
              fill="none" />
        <path d="M674 300 L350 724" 
              stroke="url(#chromoGradient)" 
              stroke-width="120" 
              stroke-linecap="round" 
              fill="none" />
        
        <!-- 着丝粒连接处平滑处理 -->
        <circle cx="512" cy="512" r="60" fill="url(#chromoGradient)" />
    </g>
</svg>
